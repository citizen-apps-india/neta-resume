name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Python workspace: neta-core + neta-sources + the ingestion runner (api is a separate, independent job).
  ingestion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --dev
      - run: uv run ruff check packages ingestion
      - run: uv run pytest -q

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --dev
      - run: uv run ruff check .
      # Render pip-installs from api/requirements.txt (NOT uv sync) — a stale export crash-loops the deploy
      # (learned the hard way: `limits` was in pyproject but missing from the export → ModuleNotFoundError).
      - name: requirements.txt matches pyproject/uv.lock
        # Compare package lines only — the autogenerated header embeds the exact command (with/without -o)
        # and "# via" annotations carry no install semantics.
        run: |
          NO_COLOR=1 uv export --no-dev --no-hashes --no-emit-project | sed '/^ *#/d' \
            | diff - <(sed '/^ *#/d' requirements.txt) \
            || { echo "::error::api/requirements.txt is stale — regenerate with: cd api && uv export --no-dev --no-hashes --no-emit-project -o requirements.txt"; exit 1; }

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
