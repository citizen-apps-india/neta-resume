services:
  db:
    image: postgres:16
    container_name: neta_db
    environment:
      POSTGRES_USER: neta
      POSTGRES_PASSWORD: neta
      POSTGRES_DB: neta
    ports:
      - "5432:5432"
    volumes:
      - neta_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neta"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: neta_api
    environment:
      # Reach the compose `db` service; +psycopg matches the app default driver.
      NETA_DATABASE_URL: postgresql+psycopg://neta:neta@db:5432/neta
      NETA_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  web:
    build:
      context: ./web
      args:
        NETA_API_BASE: http://localhost:8000
    container_name: neta_web
    environment:
      NETA_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  neta_pgdata:
