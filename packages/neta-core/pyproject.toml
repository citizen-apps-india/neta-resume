[project]
name = "neta-core"
version = "0.1.0"
description = "Neta-Resume core: config, DB, provenance, polite HTTP, transforms, entity-resolution — the Directory of Indian Politicians foundation."
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",          # polite HTTP client w/ retries
    "tenacity>=8.2",        # backoff/retry
    "sqlalchemy>=2.0",      # engine + upsert
    "psycopg[binary]>=3.2", # postgres driver
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "jellyfish>=1.0",       # phonetic keys (metaphone) for ER blocking
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["neta_core"]

[tool.ruff]
line-length = 100
target-version = "py312"
